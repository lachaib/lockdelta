name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # ── Compute version bump ────────────────────────────────────────────────
      # MAJOR : feat(action)!: or fix(action)!: etc.  (action-breaking)
      # MINOR : any other !: commit                    (lib/CLI-breaking)
      # PATCH : everything else
      - name: Compute next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"

          BUMP=patch
          while IFS= read -r subject; do
            if echo "$subject" | grep -qE '^[a-z]+\(.*action.*\)!:'; then
              BUMP=major; break
            fi
            if echo "$subject" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
              [ "$BUMP" != "major" ] && BUMP=minor
            fi
          done < <(git log "$RANGE" --format='%s')

          case "$BUMP" in
            major) NEW="$((MAJOR + 1)).0.0"; MAJOR_TAG="v$((MAJOR + 1))" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0"; MAJOR_TAG="v${MAJOR}" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"; MAJOR_TAG="v${MAJOR}" ;;
          esac

          echo "bump=$BUMP"              >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW"        >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}"             >> "$GITHUB_OUTPUT"
          echo "major_tag=${MAJOR_TAG}"  >> "$GITHUB_OUTPUT"

      # ── Update package.json + build ─────────────────────────────────────────
      - name: Bump package.json
        run: pnpm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      - name: Build
        run: pnpm run build

      # ── Commit version bump + dist/ ─────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json dist/action.js dist/action.js.map
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main

      # ── Tag the release commit ──────────────────────────────────────────────
      - name: Create version tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Update floating major tag
        run: |
          git tag ${{ steps.version.outputs.major_tag }} --force
          git push origin ${{ steps.version.outputs.major_tag }} --force

      # ── Publish to npm ──────────────────────────────────────────────────────
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance

      # ── Build changelog + finalize release ──────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname \
            | grep -v "^${{ steps.version.outputs.tag }}$" | head -1)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..${{ steps.version.outputs.tag }}"
          else
            RANGE="${{ steps.version.outputs.tag }}"
          fi

          NOTES_FILE=$(mktemp)

          DRAFT_BODY='${{ github.event.release.body }}'
          if [ -n "$DRAFT_BODY" ]; then
            printf '%s\n\n---\n\n' "$DRAFT_BODY" >> "$NOTES_FILE"
          fi

          echo "## What's changed" >> "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"

          for TYPE in feat fix perf refactor chore docs; do
            LINES=$(git log "$RANGE" --format='- %s (%h)' \
              | grep -E "^- ${TYPE}(\([^)]*\))?!?:" || true)
            if [ -n "$LINES" ]; then
              case "$TYPE" in
                feat)     echo "### Features" >> "$NOTES_FILE" ;;
                fix)      echo "### Bug fixes" >> "$NOTES_FILE" ;;
                perf)     echo "### Performance" >> "$NOTES_FILE" ;;
                refactor) echo "### Refactoring" >> "$NOTES_FILE" ;;
                chore)    echo "### Maintenance" >> "$NOTES_FILE" ;;
                docs)     echo "### Documentation" >> "$NOTES_FILE" ;;
              esac
              echo "$LINES" >> "$NOTES_FILE"
              echo "" >> "$NOTES_FILE"
            fi
          done

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: actions/github-script@v7
        env:
          NOTES_FILE: ${{ steps.changelog.outputs.notes_file }}
          NEW_TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.NOTES_FILE, 'utf8');
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              tag_name: process.env.NEW_TAG,
              name: process.env.NEW_TAG,
              body,
              draft: false,
              prerelease: false,
            });
