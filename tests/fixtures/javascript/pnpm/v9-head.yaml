lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:
  .:
    dependencies:
      axios:
        specifier: ^1.7.0
        version: 1.7.2
      express:
        specifier: ^4.19.2
        version: 4.19.2
      lodash:
        specifier: ^4.17.21
        version: 4.17.21
    devDependencies:
      typescript:
        specifier: ^5.4.0
        version: 5.4.5

packages:
  axios@1.7.2:
    resolution: {integrity: sha512-new}
  express@4.19.2:
    resolution: {integrity: sha512-updated}
    engines: {node: '>= 0.10.0'}
  lodash@4.17.21:
    resolution: {integrity: sha512-def}
  typescript@5.4.5:
    resolution: {integrity: sha512-newer}
    engines: {node: '>=14.17'}
    hasBin: true
  accepts@1.3.8:
    resolution: {integrity: sha512-jkl}

snapshots:
  axios@1.7.2:
    dependencies:
      follow-redirects: 1.15.6
  express@4.19.2:
    dependencies:
      accepts: 1.3.8
  lodash@4.17.21: {}
  typescript@5.4.5: {}
  accepts@1.3.8: {}
